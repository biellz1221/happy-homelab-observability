global:
  scrape_interval: 60s          # intervalo de coleta — 60s é suficiente para home lab
  evaluation_interval: 60s
  scrape_timeout: 30s
  external_labels:
    instance: 'raspberry-pi-5'

alerting:
  alertmanagers: []             # adicione um alertmanager aqui se quiser alertas por email/telegram

rule_files: []

scrape_configs:

  # Prometheus se auto-monitora
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Métricas do host (CPU, RAM, disco, rede, temperatura)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']    # node-exporter usa network_mode: host

  # Métricas por container Docker
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      # Remove métricas pouco úteis para economizar memória
      - source_labels: [__name__]
        regex: 'container_(network_tcp_usage_total|tasks_state|cpu_load_average_10s)'
        action: drop

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # ── Redis ────────────────────────────────────────────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # ── N8N ──────────────────────────────────────────────────────────────────
  - job_name: 'n8n'
    static_configs:
      - targets: ['host.docker.internal:5678']
    metrics_path: '/metrics'

  # ── APIs Node.js (PM2) ──────────────────────────────────────────────────
  # Requer prom-client instalado em cada backend expondo GET /metrics
  - job_name: 'linguacross-api'
    static_configs:
      - targets: ['host.docker.internal:4000']
    metrics_path: '/metrics'

  - job_name: 'bookworm-api'
    static_configs:
      - targets: ['host.docker.internal:4100']
    metrics_path: '/metrics'

  - job_name: 'certifizi-api'
    static_configs:
      - targets: ['host.docker.internal:4200']
    metrics_path: '/metrics'

  - job_name: 'anote-sua-despesa-api'
    static_configs:
      - targets: ['host.docker.internal:4300']
    metrics_path: '/metrics'
